server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    # Railway는 SPRING_DATASOURCE_URL 환경변수를 직접 설정하면 됩니다.
    # 예: jdbc:mysql://HOST:PORT/railway?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sprevn?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  security:
    user:
      password: disable

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.sprevn.entity

jwt:
  secret: ${JWT_KEY:sprevnSecretKeyForJWTTokenGenerationAndValidation2024VeryLongAndSecureKey}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

# CORS 허용 도메인 (쉼표로 구분)
# Railway 환경변수에서 설정: CORS_ALLOWED_ORIGINS=https://xxx.vercel.app
cors:
  allowed-origins: https://dabin-kang-front.vercel.app/

logging:
  level:
    com.sprevn: INFO
    org.springframework.security: WARN
