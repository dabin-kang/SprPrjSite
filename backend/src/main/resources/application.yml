server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:MySQL://junction.proxy.rlwy.net:53390/railway?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  security:
    user:
      password: disable

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.sprevn.entity

jwt:
  secret: ${JWT_KEY:sprevnSecretKeyForJWTTokenGenerationAndValidation2024VeryLongAndSecureKey}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

# CORS 허용 도메인 (쉼표로 구분, Railway 환경변수에서 설정)
# 예) https://sprprjsite.vercel.app,https://www.sprevn.com
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.sprevn: DEBUG
    org.springframework.security: DEBUG
