server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sprevn?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  security:
    user:
      password: disable

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.sprevn.entity

jwt:
  secret: sprevnSecretKeyForJWTTokenGenerationAndValidation2024VeryLongAndSecureKey
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.sprevn: DEBUG
    org.springframework.security: DEBUG
